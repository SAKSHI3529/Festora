<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .header { background-color: #34495e; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>New Budget Request</h1></div>
        <div class="content">
            <p>Faculty Coordinator <strong>{{ faculty_name }}</strong> has submitted a new budget request.</p>
            <p><strong>Amount:</strong> ₹{{ amount }}</p>
            <p><strong>Description:</strong> {{ description }}</p>
            <p>Please review it in the Admin Dashboard.</p>
        </div>
        <div class="footer">&copy; 2026 Festora Cultural Event Management System</div>
    </div>
</body>
</html>
