<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .header { background-color: #27ae60; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>Budget Approved!</h1></div>
        <div class="content">
            <h3>Hello {{ faculty_name }},</h3>
            <p>Your budget request for <strong>₹{{ amount }}</strong> has been approved by the Administrator.</p>
            <p>You can now proceed with the planned expenses.</p>
        </div>
        <div class="footer">&copy; 2026 Festora Cultural Event Management System</div>
    </div>
</body>
</html>
